<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
</head>
<body>
    <h1>Tables in Html</h1>
    <hr/>
    <table border>
        <colgroup>
            <col style ="background-color: lightcoral;">
            <col style ="background-color: lightblue;">
            <col style ="background-color: lightgreen;">
            <col style ="background-color: red;">
        </colgroup>
        <thead>
            <tr>
                <th>A</th>
                <th>B</th>
                <th>C</th>
                <th>M</th>
            </tr>
        </thead>
        <tbody>
        <tr>
            <td>D</td>
            <td>E</td>
            <td>F</td>
            <td>N</td>

        </tr>
        <tr>
            <td>G</td>
            <td>H</td>
            <td>I</td>
            <td>O</td>
        </tr>
        </tbody>
        <tfoot>
        <tr>
            <td>J</td>
            <td>K</td>
            <td>L</td>
            <td>P</td>
        </tfoot>
    </table>
</body>
</html>
