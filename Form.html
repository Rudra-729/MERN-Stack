<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FORMS_IN_HTML</title>
  </head>
  <body>
    <h1>Forms in HTML</h1>
    <form action="">
      <label for="UserName">Username: </label
      ><input id="UserName" type="text" minlength="5" maxlength="20" required />
      <br /><br />
      <label for="">Password: </label
      ><input type="password" minlength="5" maxlength="20" required />
      <br /><br />
      <label for="Dob">Date of birth</label><input id="DOB" type="date" />
      <br /><br />
      <label for="">Email :</label><input type="email" /> <br /><br />
      <label for="">contact info</label>
      <input type="number" minlength="10" maxlength="10" />
      <br /><br />
      <p>Enter your favorite fruit:</p>
      <label for="Mango">mango</label>
      <input id="Mango" name="fruit" type="radio" />
      <label for="Banana">banana</label>
      <input id="Banana" name="fruit" type="radio" />
      <label for="Apple">apple</label>
      <input id="Apple" name="fruit" type="radio" />
    </form>
  </body>
</html>
